services:
  go2rtc:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: local/go2rtc-legacybridge
    container_name: go2rtc-legacybridge
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:1984/api/streams >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 10s
    environment:
      - DVR_IP=${DVR_IP}
      - DVR_USER=${DVR_USER}
      - DVR_PASSWORD=${DVR_PASSWORD}
      - DVR_CMD_PORT=${DVR_CMD_PORT:-6001}
      - DVR_DATA_PORT=${DVR_DATA_PORT:-6002}
      - DVR_STREAM=${DVR_STREAM:-0}
      - DVR_KEEPALIVE=${DVR_KEEPALIVE:-1s}
      - DVR_RECONNECT=${DVR_RECONNECT:-3s}
      - DVR_VERBOSE=${DVR_VERBOSE:-0}
      - DVR_PROTOCOL_OFFSET=${DVR_PROTOCOL_OFFSET:--1}
      - DVR_DIAG_FILE=${DVR_DIAG_FILE:-}
    volumes:
      - ./config:/config
